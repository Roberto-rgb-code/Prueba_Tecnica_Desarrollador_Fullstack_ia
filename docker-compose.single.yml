name: toka-all-in-one

services:
  ollama:
    image: ollama/ollama:latest
    volumes:
      - ollama-data:/root/.ollama
    restart: unless-stopped
    shm_size: 2gb

  ollama-init:
    image: ollama/ollama:latest
    depends_on:
      - ollama
    environment:
      OLLAMA_HOST: http://ollama:11434
      OLLAMA_CHAT_MODEL: ${OLLAMA_CHAT_MODEL:-llama3.2:1b}
      OLLAMA_EMBED_MODEL: ${OLLAMA_EMBED_MODEL:-nomic-embed-text}
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        echo "Waiting for Ollama..."
        until ollama list >/dev/null 2>&1; do sleep 3; done
        echo "Pulling $${OLLAMA_CHAT_MODEL}..."
        ollama pull "$${OLLAMA_CHAT_MODEL}"
        echo "Pulling $${OLLAMA_EMBED_MODEL}..."
        ollama pull "$${OLLAMA_EMBED_MODEL}"
        echo "Ollama models ready."
    restart: "no"

  toka:
    image: ghcr.io/roberto-rgb-code/toka-all-in-one:latest
    pull_policy: missing
    build:
      context: .
      dockerfile: Dockerfile.all-in-one
    ports:
      - "3000:80"
    environment:
      MSSQL_SA_PASSWORD: "Toka@123456"
      ACCEPT_EULA: "Y"
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      Llm__Provider: ${LLM_PROVIDER:-Ollama}
      Ollama__Enabled: "true"
      Ollama__BaseUrl: http://ollama:11434
      Ollama__ChatModel: ${OLLAMA_CHAT_MODEL:-llama3.2:1b}
      Ollama__EmbeddingModel: ${OLLAMA_EMBED_MODEL:-nomic-embed-text}
      Ollama__EmbeddingDimensions: "768"
    depends_on:
      ollama-init:
        condition: service_completed_successfully
    restart: unless-stopped
    shm_size: 256mb

volumes:
  ollama-data:
